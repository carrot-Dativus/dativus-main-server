spring:
  # 💡 새롭게 추가된 파일 업로드 용량 해제 설정 (50MB)
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  config:
    import: optional:file:.env
  datasource:
    url: jdbc:postgresql://localhost:5432/dativus_db
    username: postgres
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  # Spring Boot가 토큰을 '만들 때' 사용하는 키
  secret: DativusCapstoneProjectSuperSecretMasterKey2026ForJwtAuthentication
  expiration_time: 3600000 # 60분 (밀리초 단위)